<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <!-- Bootstrap CSS & Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fffffe;
            font-family: 'Poppins', sans-serif;
        }
        .header-bg {
            background-color: #1e3a8a;
        }
        .card-custom {
            border-radius: 15px;
            border: 2px solid #1e3a8a;
            max-width: 450px;
            width: 100%;
        }
        .btn-login {
            background-color: #1e3a8a;
            border: none;
            width: 100px;
            height: 50px;
        }
        .btn-login:hover {
            background-color: #163172;
        }
        .form-control {
            border-radius: 25px;
            padding: 10px 15px;
            margin-bottom: 15px;
        }
        .btn-sweetalert {
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 25%;
        }
        .btn-sweetalert:hover {
            background-color: #1e40af;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-bg p-4 shadow-lg">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="bi bi-globe-americas fs-3 text-white me-3"></i>
                <h1 class="text-white fs-3 fw-bold m-0">Inicio de sesión</h1>
            </div>
        </div>
    </header>
    <!---->

    <!-- Form de login -->
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card card-custom shadow-lg p-4 bg-white">
            <div class="card-body py-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Iniciar sesión</h2>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="email" class="form-control" id="correoLogin" placeholder="Correo electrónico">
                    </div>
                    <div class="mb-4">
                        <input type="password" class="form-control" id="contrasenaLogin" placeholder="Contraseña">
                    </div>
                    <div class="d-flex justify-content-center mb-3">
                        <button type="submit" class="btn btn-login text-white"><i class="bi bi-arrow-right fs-4"></i></button>
                    </div>
                    <div class="text-center">
                        <a href="registro.html" class="text-black" style="text-decoration: none;">¿No tienes una cuenta? Regístrate</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!---->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   <!-- JS de sesión -->
    <script type="module" src="../js/sesion.js"></script>
</body>
</html>
