<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <!-- Bootstrap CSS & Icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <!-- SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fffffe;
            font-family: 'Poppins', sans-serif;
        }
        .header-bg {
            background-color: #1e3a8a;
        }
        .btn-agregar {
            background-color: #4ade80;
            color: #000;
            border: none;
            transition: all 0.3s;
        }
        .btn-agregar:hover {
            background-color: #22c55e;
        }
        .btn-editar {
            background-color: #1e3a8a;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .btn-eliminar {
            background-color: #f87171;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .btn-editar:hover {
            background-color: #1e40af;
        }
        .btn-eliminar:hover {
            background-color: #ef4444;
        }
        .card-custom {
            border-radius: 15px;
            border: 2px solid #1e3a8a;
        }
        .btn-sweetalert {
            background-color: #1e3a8a;
            color: white;
            border: none;
            border-radius: 25%;
        }
        .btn-sweetalert:hover {
            background-color: #1e40af;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header-bg p-4 shadow-lg">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="bi bi-globe-americas fs-3 text-white me-3"></i>
                <h1 class="text-white fs-3 fw-bold m-0">Gestión de productos</h1>
            </div>
            <button class="text-white fs-3 border-0 bg-transparent" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar" style="position: fixed; top: 92px; right: 0; width: 280px; height: calc(100% - 80px); background-color: #333; z-index: 1000;">
                <div class="d-flex flex-column h-100">
                    <div class="p-3">
                        <a href="dashboard.html" class="d-flex align-items-center text-decoration-none text-white mb-4">
                            <i class="bi bi-house-door-fill me-3"></i>
                            <span class="fs-6">Dashboard</span>
                        </a>
                        <a href="#" class="d-flex align-items-center text-decoration-none text-white mb-4">
                            <i class="bi bi-view-list me-3"></i>
                            <span class="fs-6">Gestión de productos</span>
                        </a>
                        <a href="catalogo.html" class="d-flex align-items-center text-decoration-none text-white mb-4">
                            <i class="bi bi-view-list me-3"></i>
                            <span class="fs-6">Catálogo</span>
                        </a>
                        <a href="pedidos.html" class="d-flex align-items-center text-decoration-none text-white mb-4">
                            <i class="bi bi-bag-fill me-3"></i>
                            <span class="fs-6">Historial de pedidos</span>
                        </a>
                        <a href="#" class="d-flex align-items-center text-decoration-none text-white mb-4" id="abrirCarrito">
                            <i class="bi bi-cart-fill me-3"></i>
                            <span class="fs-6">Carrito</span>
                        </a>
                    </div>
                    
                    <div class="mt-auto p-3 mb-2">
                        <button  id="VaciarAll" class="btn w-100 mb-2 py-2" style="background-color: #ffc107; color: black;">
                            <i class="bi bi-trash-fill me-2"></i>Vaciar datos
                        </button>
                        <button class="btn btn-danger w-100 py-2" id="cerrarSesionBtn">
                            <i class="bi bi-door-closed-fill me-2"></i>Cerrar sesión
                        </button>
                    </div>
                </div>
            </div>
            <!---->
        </div>
    </header>
    <!---->

    <!-- Contenido principal -->
    <div class="container my-5">
        <div class="card card-custom shadow-lg p-4 bg-white">
            <div class="card-body">

                <div class="text-center mt-2 mb-4">
                    <button class="btn btn-agregar px-5 py-3 rounded-pill shadow" id="agregarProductoBtn">
                        <i class="bi bi-plus-circle-fill me-2"></i>
                        <span class="font-semibold">Agregar producto</span>
                    </button>
                </div>

                <!-- DataTable de productos -->
                <div class="table-responsive">
                    <table id="productosTabla" class="table table-hover table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Las filas de productos se generarán dinámicamente -->
                        </tbody>
                    </table>
                </div>
                <!---->
            </div>
        </div>
    </div>
    <!---->

    <!-- Modal para agregar producto -->
    <div class="modal fade" id="agregarProductoModal" tabindex="-1" aria-labelledby="agregarProductoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: #fffffe; border-radius: 15px;">
                <div class="modal-body p-4">
                    <h2 class="text-center mb-4 fw-bold" style="color: #1e3a8a;">Agregar producto</h2>
                    
                    <form id="agregarProductoForm" class="text-center">
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3">
                                <input type="text" class="form-control rounded-pill" id="nombreProducto" placeholder="Nombre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <select class="form-select rounded-pill" id="categoriaProducto">
                                    <option value="" selected disabled>Categoría</option>
                                    <option value="Electrónicos">Electrónicos</option>
                                    <option value="Limpieza">Limpieza</option>
                                    <option value="Alimentos">Alimentos</option>
                                    <option value="Vestimenta">Vestimenta</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3">
                                <input type="number" class="form-control rounded-pill" id="precioProducto" placeholder="Precio" step="0.1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <input type="number" class="form-control rounded-pill" id="stockProducto" placeholder="Stock" step="1">
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col mb-3">
                                <input type="url" class="form-control rounded-pill" id="urlImgProducto" placeholder="URL de la imagen">
                            </div>
                        </div>
                        <div class="mb-4"></div>
                            <button type="button" class="btn btn-secondary rounded-pill px-4 me-3" data-bs-dismiss="modal" style="background-color: #777777; border: none;">Cancelar</button>
                            <button type="submit" class="btn rounded-pill px-4" style="background-color: #1e3a8a; color: white;">Continuar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!---->

    <!-- Modal para editar producto -->
    <div class="modal fade" id="editarProductoModal" tabindex="-1" aria-labelledby="editarProductoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: #fffffe; border-radius: 15px;">
                <div class="modal-body p-4">
                    <h2 class="text-center mb-4 fw-bold" style="color: #1e3a8a;">Editar producto</h2>
                    
                    <form id="reagregarProductoForm" class="text-center">
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3">
                                <label>Nombre</label>
                                <input type="text" class="form-control rounded-pill" id="renombreProducto" placeholder="Nombre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Categoría</label>
                                <select class="form-select rounded-pill" id="recategoriaProducto">
                                    <option value="" selected disabled>Categoría</option>
                                    <option value="Electrónicos">Electrónicos</option>
                                    <option value="Limpieza">Limpieza</option>
                                    <option value="Alimentos">Alimentos</option>
                                    <option value="Vestimenta">Vestimenta</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3">
                                <label>Precio</label>
                                <input type="number" class="form-control rounded-pill" id="reprecioProducto" placeholder="Precio" step="0.1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Stock</label>
                                <input type="number" class="form-control rounded-pill" id="restockProducto" placeholder="Stock" step="1">
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col mb-3">
                                <input type="url" class="form-control rounded-pill" id="reurlImgProducto" placeholder="URL de la imagen">
                            </div>
                        </div>
                        <div class="mb-4"></div>
                            <button type="button" class="btn btn-secondary rounded-pill px-4 me-3" data-bs-dismiss="modal" style="background-color: #777777; border: none;">Cancelar</button>
                            <button type="submit" class="btn rounded-pill px-4" style="background-color: #1e3a8a; color: white;">Continuar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!---->

    <!-- Modal del carrito -->
    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-labelledby="modalCarritoLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="background-color: #fffffe; border-radius: 15px;">
                <div class="modal-body p-4">
                    <h2 class="text-center mb-4 fw-bold" style="color: #1e3a8a;">
                        Carrito
                    </h2>
                    <!-- Contenedor de productos del carrito -->
                    <div id="contenidoCarrito" style="max-height: 400px; overflow-y: auto;">
                        <!-- Aquí se agregarán los productos del carrito dinámicamente -->
                    </div>
                    <!-- Total -->
                    <div class="border-top mt-3 pt-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="mb-0 fw-bold" style="color: #1e3a8a;">Total:</h4>
                            <h4 class="mb-0 fw-bold text-success">$<span id="totalCarrito">0.00</span></h4>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                                <h4 class="mb-0 fw-bold" style="color: #1e3a8a;">Total(IVA 16%):</h4>
                                <h4 class="mb-0 fw-bold text-success">$<span id="totalCarritoiva">0.00</span></h4>
                        </div>
                    </div>
                    <!-- Botones -->
                    <div class="text-center">
                        <button type="button" class="btn btn-secondary rounded-pill px-4 me-2" data-bs-dismiss="modal" style="background-color: #777777; border: none;">
                            Cerrar
                        </button>
                        <button type="button" id="VaciarCarrito" class="btn btn-danger rounded-pill px-4 me-2" id="btnVaciarCarrito" style="color: #ffffff;">
                            <i class="bi bi-trash"></i> Vaciar carrito
                        </button>
                        <button type="button" id="Aceptar_compra" class="btn rounded-pill px-4" id="btnProcesarCompra" style="background-color: #1e3a8a; color: white;">
                            <i class="bi bi-check-circle"></i> Finalizar compra
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    <!-- SweetAlert2 JS -->
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Sidebar -->
    <script type="module" src="../js/sidebar.js"></script>
    <!-- JS de productos -->
    <script type="module" src="../js/qwerty.js"></script>
    <script type="module" src="../js/productos.js"></script>
    <!-- JS de sesión -->
    <script type="module" src="../js/sesion.js"></script>
    <!-- JS de carrito -->
    <script type="module" src="../js/carrito.js"></script>
</body>
</html>
