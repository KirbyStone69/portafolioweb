    <script src="../../static/js/git-simulator.js"></script>

    <!-- Configuración del ejercicio -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            GitSimulator.init({
                pasos: [
                    {
                        titulo: 'Inicializar un repositorio',
                        instruccion: `
                            <p>Empecemos creando un repositorio nuevo. Usa
                            <code>git init</code> para inicializarlo.</p>
                            <p>Estamos en la carpeta <strong>mi-web</strong>
                            que será un proyecto de página web.</p>
                        `,
                        comando_esperado: 'git init',
                        salida: 'Initialized empty Git repository in ~/mi-web/.git/',
                        pista: 'Escribe: git init',
                        fs_cambios: function (fs) {
                            fs['~'].children['.git'] = {
                                type: 'dir',
                                children: {
                                    'HEAD': { type: 'file' },
                                    'config': { type: 'file' },
                                    'objects': { type: 'dir', children: {} },
                                    'refs': { type: 'dir', children: {} }
                                }
                            };
                        }
                    },
                    {
                        titulo: 'Crear un archivo',
                        instruccion: `
                            <p>Simula crear un archivo <code>index.html</code>
                            usando <code>touch</code>.</p>
                            <p>El comando <code>touch</code> crea un archivo
                            vacío. En la vida real editarías este archivo con
                            tu editor (VS Code, etc.).</p>
                        `,
                        comando_esperado: 'touch index.html',
                        salida: '',
                        pista: 'Escribe: touch index.html',
                        fs_cambios: function (fs) {
                            fs['~'].children['index.html'] = { type: 'file' };
                        }
                    },
                    {
                        titulo: 'Ver el estado del repositorio',
                        instruccion: `
                            <p>Usa <code>git status</code> para ver qué detectó Git.</p>
                            <p>Deberías ver <code>index.html</code> como archivo
                            <strong>sin rastrear</strong> (untracked) — Git lo ve
                            pero no lo está siguiendo todavía.</p>
                        `,
                        comando_esperado: 'git status',
                        salida: 'On branch main\n\nNo commits yet\n\nUntracked files:\n  (use "git add <file>..." to include in what will be committed)\n\n\tindex.html\n\nnothing added to commit but untracked files present (use "git add" to track)',
                        pista: 'Escribe: git status'
                    },
                    {
                        titulo: 'Agregar al staging area',
                        instruccion: `
                            <p>Ahora usa <code>git add</code> para mover
                            <code>index.html</code> al staging area.</p>
                            <p>Esto le dice a Git: <em>"incluye este archivo
                            en el próximo commit"</em>.</p>
                        `,
                        comando_esperado: ['git add index.html', 'git add .'],
                        salida: '',
                        pista: 'Escribe: git add index.html'
                    },
                    {
                        titulo: 'Verificar el staging',
                        instruccion: `
                            <p>Ejecuta <code>git status</code> de nuevo para
                            confirmar que el archivo está en staging.</p>
                            <p>Ahora debería aparecer en verde bajo
                            <em>"Changes to be committed"</em> en lugar de rojo.</p>
                        `,
                        comando_esperado: 'git status',
                        salida: 'On branch main\n\nNo commits yet\n\nChanges to be committed:\n  (use "git rm --cached <file>..." to unstage)\n\n\tnew file:   index.html',
                        pista: 'Escribe: git status'
                    },
                    {
                        titulo: 'Hacer tu primer commit',
                        instruccion: `
                            <p>¡Es hora de tu primer commit! Usa:</p>
                            <p><code>git commit -m "Agrega página de inicio"</code></p>
                            <p>El flag <code>-m</code> te permite escribir el
                            mensaje directamente. Recuerda: usa mensajes
                            descriptivos en presente imperativo.</p>
                        `,
                        comando_esperado: 'git commit -m "Agrega página de inicio"',
                        salida: '[main (root-commit) a3b8d1b] Agrega página de inicio\n 1 file changed, 0 insertions(+), 0 deletions(-)\n create mode 100644 index.html',
                        pista: 'Escribe: git commit -m "Agrega página de inicio"'
                    },
                    {
                        titulo: 'Ver el historial',
                        instruccion: `
                            <p>Usa <code>git log --oneline</code> para ver tu
                            historial de commits de forma compacta.</p>
                            <p>Deberías ver tu commit con su hash corto
                            y el mensaje que escribiste.</p>
                        `,
                        comando_esperado: ['git log --oneline', 'git log'],
                        salida: 'a3b8d1b (HEAD -> main) Agrega página de inicio',
                        pista: 'Escribe: git log --oneline'
                    },
                    {
                        titulo: 'Crear y commitear otro archivo',
                        instruccion: `
                            <p>Ahora hagamos el flujo completo rápido.
                            Crea un archivo <code>styles.css</code>,
                            agrégalo y haz commit:</p>
                            <p>Escribe: <code>touch styles.css</code></p>
                            <p>(Los pasos rápidos de add y commit
                            continuarán automáticamente)</p>
                        `,
                        comando_esperado: 'touch styles.css',
                        salida: '',
                        pista: 'Escribe: touch styles.css',
                        fs_cambios: function (fs) {
                            fs['~'].children['styles.css'] = { type: 'file' };
                        }
                    }
                ]
            });
        });
    </script>
