    <!-- Configuración del ejercicio -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            GitSimulator.init({
                pasos: [
                    {
                        titulo: 'Crear una carpeta de proyecto',
                        instruccion: `
                            <p>Primero, crea una carpeta para tu proyecto usando
                            <code>mkdir</code> (<em>make directory</em>).</p>
                            <p>Crea una carpeta llamada <strong>mi-proyecto</strong>.</p>
                            <p><strong>Tip:</strong> después de crearla puedes escribir
                            <code>ls</code> para ver que la carpeta aparece.</p>
                        `,
                        comando_esperado: 'mkdir mi-proyecto',
                        salida: '',
                        pista: 'Escribe: mkdir mi-proyecto',
                        fs_cambios: function (fs) {
                            fs['~'].children['mi-proyecto'] = {
                                type: 'dir',
                                children: {}
                            };
                        }
                    },
                    {
                        titulo: 'Entrar a la carpeta',
                        instruccion: `
                            <p>Entra a la carpeta que acabas de crear con
                            <code>cd</code> (<em>change directory</em>).</p>
                            <p>Fíjate que el prompt cambiará para mostrar
                            en qué carpeta estás.</p>
                        `,
                        comando_esperado: 'cd mi-proyecto',
                        salida: '',
                        nuevo_cwd: '~/mi-proyecto',
                        pista: 'Escribe: cd mi-proyecto'
                    },
                    {
                        titulo: 'Inicializar el repositorio',
                        instruccion: `
                            <p>Usa <code>git init</code> para convertir esta carpeta
                            en un <strong>repositorio de Git</strong>.</p>
                            <p>Esto crea la carpeta oculta <code>.git/</code> con
                            toda la estructura que Git necesita.</p>
                            <p><strong>Tip:</strong> después de init, usa
                            <code>ls -la</code> para ver la carpeta <code>.git/</code>
                            que se creó.</p>
                        `,
                        comando_esperado: 'git init',
                        salida: 'Initialized empty Git repository in ~/mi-proyecto/.git/',
                        pista: 'Escribe: git init',
                        fs_cambios: function (fs) {
                            const proj = fs['~'].children['mi-proyecto'];
                            proj.children['.git'] = {
                                type: 'dir',
                                children: {
                                    'HEAD': { type: 'file' },
                                    'config': { type: 'file' },
                                    'objects': { type: 'dir', children: {} },
                                    'refs': { type: 'dir', children: {} }
                                }
                            };
                        }
                    },
                    {
                        titulo: 'Verificar el estado del repo',
                        instruccion: `
                            <p>Usa <code>git status</code> para verificar que el
                            repositorio se creó correctamente.</p>
                            <p>Verás que estás en la rama <code>main</code>,
                            sin commits aún, y sin archivos por rastrear.</p>
                        `,
                        comando_esperado: 'git status',
                        salida: 'On branch main\n\nNo commits yet\n\nnothing to commit (create/copy files and use "git add" to track)',
                        pista: 'Escribe: git status'
                    },
                    {
                        titulo: 'Clonar un repositorio de GitHub',
                        instruccion: `
                            <p>Ahora practica <code>git clone</code>. Clona el
                            repositorio de ejemplo de GitHub:</p>
                            <p><code>git clone https://github.com/octocat/Hello-World.git</code></p>
                            <p>Esto descarga <strong>todo el proyecto</strong>
                            con su historial completo.</p>
                        `,
                        comando_esperado: 'git clone https://github.com/octocat/Hello-World.git',
                        salida: 'Cloning into \'Hello-World\'...\nremote: Enumerating objects: 13, done.\nremote: Total 13 (delta 0), reused 0 (delta 0)\nReceiving objects: 100% (13/13), done.\nResolving deltas: 100% (1/1), done.',
                        pista: 'Escribe: git clone https://github.com/octocat/Hello-World.git',
                        fs_cambios: function (fs) {
                            const proj = fs['~'].children['mi-proyecto'];
                            proj.children['Hello-World'] = {
                                type: 'dir',
                                children: {
                                    '.git': { type: 'dir', children: {} },
                                    'README': { type: 'file' }
                                }
                            };
                        }
                    },
                    {
                        titulo: 'Verificar lo que se descargó',
                        instruccion: `
                            <p>Usa <code>ls</code> para ver la carpeta
                            <strong>Hello-World</strong> que se acaba de clonar.</p>
                            <p>Deberías ver la carpeta del proyecto descargado
                            junto con la carpeta <code>.git</code> de tu repo local.</p>
                        `,
                        comando_esperado: 'ls',
                        salida: '.git/    Hello-World/',
                        pista: 'Escribe: ls'
                    }
                ]
            });
        });
    </script>
