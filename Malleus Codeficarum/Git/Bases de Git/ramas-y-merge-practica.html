    <script>
        document.addEventListener('DOMContentLoaded', function () {
            GitSimulator.init({
                pasos: [
                    {
                        titulo: 'Ver la rama actual',
                        instruccion: `
                            <p>Ya estás dentro de un repositorio con un commit
                            inicial. Usa <code>git branch</code> para ver en qué
                            rama estás.</p>
                            <p>El asterisco <code>*</code> indica la rama activa.</p>
                        `,
                        comando_esperado: 'git branch',
                        salida: '* main',
                        pista: 'Escribe: git branch',
                        fs_cambios: function (fs) {
                            fs['~'].children['.git'] = { type: 'dir', children: {} };
                            fs['~'].children['index.html'] = { type: 'file' };
                            fs['~'].children['styles.css'] = { type: 'file' };
                        }
                    },
                    {
                        titulo: 'Crear una nueva rama',
                        instruccion: `
                            <p>Crea una rama llamada <strong>feature/navbar</strong>
                            para desarrollar una barra de navegación.</p>
                            <p>Usa <code>git checkout -b</code> para crearla y
                            moverte a ella en un solo paso.</p>
                        `,
                        comando_esperado: 'git checkout -b feature/navbar',
                        salida: 'Switched to a new branch \'feature/navbar\'',
                        pista: 'Escribe: git checkout -b feature/navbar'
                    },
                    {
                        titulo: 'Verificar la rama',
                        instruccion: `
                            <p>Confirma que estás en la nueva rama con
                            <code>git branch</code>.</p>
                            <p>Deberías ver ambas ramas, con
                            <code>feature/navbar</code> marcada con <code>*</code>.</p>
                        `,
                        comando_esperado: 'git branch',
                        salida: '  main\n* feature/navbar',
                        pista: 'Escribe: git branch'
                    },
                    {
                        titulo: 'Crear un archivo en la rama',
                        instruccion: `
                            <p>Simula crear un archivo <code>navbar.html</code>
                            en esta rama de feature.</p>
                            <p>Este archivo solo existirá en esta rama hasta
                            que hagas merge con <code>main</code>.</p>
                        `,
                        comando_esperado: 'touch navbar.html',
                        salida: '',
                        pista: 'Escribe: touch navbar.html',
                        fs_cambios: function (fs) {
                            fs['~'].children['navbar.html'] = { type: 'file' };
                        }
                    },
                    {
                        titulo: 'Hacer commit en la rama',
                        instruccion: `
                            <p>Agrega el archivo y haz un commit. Primero haz
                            <code>git add navbar.html</code>.</p>
                        `,
                        comando_esperado: ['git add navbar.html', 'git add .'],
                        salida: '',
                        pista: 'Escribe: git add navbar.html'
                    },
                    {
                        titulo: 'Confirmar el cambio',
                        instruccion: `
                            <p>Ahora haz el commit con un mensaje descriptivo:</p>
                            <p><code>git commit -m "Agrega navbar"</code></p>
                        `,
                        comando_esperado: 'git commit -m "Agrega navbar"',
                        salida: '[feature/navbar 7f3a2c1] Agrega navbar\n 1 file changed, 0 insertions(+), 0 deletions(-)\n create mode 100644 navbar.html',
                        pista: 'Escribe: git commit -m "Agrega navbar"'
                    },
                    {
                        titulo: 'Volver a main',
                        instruccion: `
                            <p>Tu feature está lista. Ahora necesitas volver a
                            <code>main</code> para hacer el merge allí.</p>
                            <p>Recuerda: <strong>siempre te mueves a la rama que
                            va a recibir</strong> los cambios.</p>
                        `,
                        comando_esperado: ['git checkout main', 'git switch main'],
                        salida: 'Switched to branch \'main\'',
                        pista: 'Escribe: git checkout main'
                    },
                    {
                        titulo: 'Fusionar la rama',
                        instruccion: `
                            <p>Ahora fusiona <code>feature/navbar</code> dentro
                            de <code>main</code> con <code>git merge</code>.</p>
                            <p>Como <code>main</code> no avanzó, será un
                            <strong>fast-forward</strong> (merge rápido).</p>
                        `,
                        comando_esperado: 'git merge feature/navbar',
                        salida: 'Updating a3b8d1b..7f3a2c1\nFast-forward\n navbar.html | 0\n 1 file changed, 0 insertions(+), 0 deletions(-)\n create mode 100644 navbar.html',
                        pista: 'Escribe: git merge feature/navbar'
                    },
                    {
                        titulo: 'Eliminar la rama fusionada',
                        instruccion: `
                            <p>La rama ya fue fusionada, así que puedes
                            eliminarla para mantener el repo limpio.</p>
                            <p>Usa <code>git branch -d</code> para eliminarla
                            de forma segura (solo funciona si ya fue fusionada).</p>
                        `,
                        comando_esperado: 'git branch -d feature/navbar',
                        salida: 'Deleted branch feature/navbar (was 7f3a2c1).',
                        pista: 'Escribe: git branch -d feature/navbar'
                    }
                ]
            });
        });
    </script>
